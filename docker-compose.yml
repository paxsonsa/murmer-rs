# Runs a 3-node murmer cluster using the cluster_chat example.
#
#   docker compose up --build
#
# No manual key setup. The entrypoint (docker-entrypoint.sh) generates each
# node's persistent key in the shared ./keys volume, publishes its public
# endpoint id, and the joiners (beta, gamma) dial the seed (alpha) by that id.
# Keys persist in ./keys across restarts, so node identities are stable.

services:
  alpha:
    build: .
    environment:
      MURMER_NODE: alpha          # seed node (no MURMER_SEED)
    ports:
      - "7100:7100/udp"
    volumes:
      - ./keys:/keys
    networks:
      - murmer

  beta:
    build: .
    environment:
      MURMER_NODE: beta
      MURMER_SEED: alpha          # join via alpha's published id
    depends_on:
      - alpha
    volumes:
      - ./keys:/keys
    networks:
      - murmer

  gamma:
    build: .
    environment:
      MURMER_NODE: gamma
      MURMER_SEED: alpha
    depends_on:
      - alpha
    volumes:
      - ./keys:/keys
    networks:
      - murmer

networks:
  murmer:
    driver: bridge

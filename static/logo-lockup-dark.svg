<svg viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e42"/>
      <stop offset="100%" stop-color="#ef6443"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e42" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e42" stop-opacity="0"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" rx="16" fill="#0f1623"/>

  <!-- Mark — shifted to left -->
  <g transform="translate(20, 10) scale(0.9)">
    <circle cx="78" cy="82" r="40" fill="url(#glow)" opacity="0.5"/>
    <circle cx="78" cy="82" r="26" fill="none" stroke="#f59e42" stroke-width="1" opacity="0.35"/>
    <circle cx="78" cy="82" r="42" fill="none" stroke="#f59e42" stroke-width="0.6" opacity="0.2"/>
    <circle cx="134" cy="108" r="22" fill="none" stroke="#ef6443" stroke-width="1" opacity="0.3"/>
    <circle cx="134" cy="108" r="36" fill="none" stroke="#ef6443" stroke-width="0.6" opacity="0.15"/>
    <line x1="78" y1="82" x2="134" y2="108" stroke="url(#signal)" stroke-width="1.4" opacity="0.3"/>
    <line x1="78" y1="82" x2="100" y2="148" stroke="url(#signal)" stroke-width="0.9" opacity="0.18"/>
    <line x1="134" y1="108" x2="100" y2="148" stroke="url(#signal)" stroke-width="0.9" opacity="0.18"/>
    <line x1="78" y1="82" x2="98" y2="52" stroke="url(#signal)" stroke-width="0.6" opacity="0.12"/>
    <circle cx="78" cy="82" r="8" fill="url(#signal)"/>
    <circle cx="78" cy="82" r="4" fill="#0f1623"/>
    <circle cx="134" cy="108" r="6.5" fill="url(#signal)"/>
    <circle cx="134" cy="108" r="3.2" fill="#0f1623"/>
    <circle cx="100" cy="148" r="5" fill="url(#signal)" opacity="0.7"/>
    <circle cx="100" cy="148" r="2.5" fill="#0f1623"/>
    <circle cx="98" cy="52" r="3.5" fill="url(#signal)" opacity="0.45"/>
    <circle cx="98" cy="52" r="1.8" fill="#0f1623"/>
  </g>

  <!-- Wordmark -->
  <text x="230" y="112" fill="#f1f5f9"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="56" font-weight="300" letter-spacing="0.2em">murmer</text>

  <!-- Tagline -->
  <text x="234" y="142" fill="#64748b"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="14" font-weight="500" letter-spacing="0.15em">distributed actors for rust</text>
</svg>

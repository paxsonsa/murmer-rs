  <text x="62" y="144" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8">.send(msg)</text>

  <line x1="114" y1="132" x2="142" y2="132" stroke="#f59e42" stroke-width="1.5" marker-end="url(#arr)"/>


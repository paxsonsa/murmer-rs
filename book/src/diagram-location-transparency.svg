<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7z" fill="#f59e42"/>
    </marker>

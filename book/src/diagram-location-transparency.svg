  <text x="608" y="202" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="500" fill="#f1f5f9">Deserialize</text>
  <text x="608" y="216" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#94a3b8">bincode</text>

  <line x1="654" y1="205" x2="676" y2="205" stroke="#ef6443" stroke-width="1" marker-end="url(#arr-coral)"/>

  <rect x="684" y="184" width="50" height="42" rx="6" fill="#2a3650" stroke="#ef6443" stroke-width="1.5"/>
  <text x="709" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#f1f5f9">Actor</text>

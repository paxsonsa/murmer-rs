<svg viewBox="0 0 600 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7z" fill="#f59e42"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0 L10 3.5 L0 7z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <!-- Row 1: [*] → Starting → Running → Crashed -->

  <!-- Initial dot -->
  <circle cx="38" cy="42" r="7" fill="#f59e42"/>
  <circle cx="38" cy="42" r="3" fill="#0a0e17"/>
  <line x1="45" y1="42" x2="62" y2="42" stroke="#f59e42" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Starting -->
  <rect x="70" y="22" width="120" height="40" rx="18" fill="#2a3650" stroke="#64748b" stroke-width="1"/>
  <text x="130" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" fill="#f1f5f9">Starting</text>

  <!-- Starting → Running -->
  <line x1="190" y1="42" x2="218" y2="42" stroke="#f59e42" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="204" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#94a3b8">registered</text>

  <!-- Running -->
  <rect x="226" y="22" width="140" height="40" rx="18" fill="#f59e42" stroke="#ef6443" stroke-width="1.5"/>
  <text x="296" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#1a2235">Running</text>

  <!-- Running → Crashed -->
  <line x1="366" y1="42" x2="412" y2="42" stroke="#ef6443" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="389" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="500" fill="#ef6443">panic!</text>

  <!-- Crashed -->
  <rect x="420" y="22" width="120" height="40" rx="18" fill="#ef6443" stroke="#f59e42" stroke-width="1.5"/>
  <text x="480" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#fff">Crashed</text>

  <!-- Row 2: Stopped, Restarting, Dead -->

  <!-- Running → Stopped (curve down-left) -->
  <path d="M 270 62 C 270 105 130 105 130 138" stroke="#f59e42" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="175" y="93" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8">shutdown</text>

  <!-- Stopped -->
  <rect x="70" y="145" width="120" height="40" rx="18" fill="#2a3650" stroke="#64748b" stroke-width="1"/>
  <text x="130" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" fill="#f1f5f9">Stopped</text>

  <!-- Crashed → Restarting (curve down-left) -->
  <path d="M 455 62 C 455 105 345 105 345 138" stroke="#f59e42" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="420" y="98" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8">Trans / Perm</text>

  <!-- Crashed → Dead (straight down) -->
  <line x1="500" y1="62" x2="500" y2="138" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="518" y="104" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b">Temp</text>

  <!-- Restarting -->
  <rect x="245" y="145" width="150" height="40" rx="18" fill="#2a3650" stroke="#f59e42" stroke-width="1.5"/>
  <text x="320" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" fill="#f1f5f9">Restarting</text>

  <!-- Dead -->
  <rect x="440" y="145" width="110" height="40" rx="18" fill="#1a2235" stroke="#64748b" stroke-width="1"/>
  <text x="495" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" fill="#64748b">Dead</text>
  <!-- Terminal dot -->
  <circle cx="530" cy="165" r="5" fill="none" stroke="#64748b" stroke-width="1"/>
  <circle cx="530" cy="165" r="2.5" fill="#64748b"/>

  <!-- Stopped → Restarting -->
  <line x1="190" y1="165" x2="237" y2="165" stroke="#f59e42" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="213" y="157" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8">Perm</text>

  <!-- Stopped → Dead (curve below) -->
  <path d="M 130 185 C 130 240 495 240 495 185" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-g)"/>
  <text x="312" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b">Temp / Transient</text>

  <!-- Restarting → Running (return arrow, curved right) -->
  <path d="M 350 145 C 380 105 355 80 330 62" stroke="#2dd4bf" stroke-width="1.5" fill="none" marker-end="url(#arr-up)"/>
  <text x="374" y="100" font-family="JetBrains Mono, monospace" font-size="8" font-weight="500" fill="#2dd4bf">factory.create()</text>

  <!-- Restarting → Dead -->
  <line x1="395" y1="165" x2="432" y2="165" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-g)"/>
  <text x="413" y="157" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b">max</text>
</svg>
